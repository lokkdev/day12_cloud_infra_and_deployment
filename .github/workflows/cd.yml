name: CD — Deploy BaSau Agent

on:
  workflow_run:
    workflows: ["CI — BaSau Agent"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-basau-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="${{ secrets.VPS_REPO_DIR }}"
            REPO_DIR="${REPO_DIR:-/opt/basau-agent}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            APP_DIR="$REPO_DIR/06-lab-complete"

            if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            if [ ! -d "$REPO_DIR/.git" ]; then
              mkdir -p "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f "$APP_DIR/.env.local" ]; then
              echo "ERROR: $APP_DIR/.env.local not found."
              echo "Create it before first deploy (see 06-lab-complete/.env.example)."
              exit 1
            fi

            cd "$APP_DIR"
            $COMPOSE down --remove-orphans || true
            docker rm -f 06-lab-complete_agent_1 06-lab-complete_redis_1 2>/dev/null || true
            $COMPOSE up -d --build --remove-orphans
            $COMPOSE ps

            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
                echo "Deploy OK"
                curl -s http://127.0.0.1:8000/health
                exit 0
              fi
              sleep 2
            done

            echo "Health check failed — container logs:"
            $COMPOSE logs --tail=80 agent
            exit 1
