name: CD — Deploy BaSau Agent

on:
  workflow_run:
    workflows: ["CI — BaSau Agent"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-basau-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Validate required secrets
        run: |
          missing=0
          check() { if [ -z "$1" ]; then echo "❌ Missing secret: $2"; missing=1; else echo "✅ $2"; fi; }
          check "${{ secrets.VPS_HOST }}" "VPS_HOST"
          check "${{ secrets.VPS_USER }}" "VPS_USER"
          check "${{ secrets.VPS_SSH_KEY }}" "VPS_SSH_KEY"
          check "${{ secrets.VPS_PORT }}" "VPS_PORT"
          if [ -n "${{ secrets.VPS_REPO_DIR }}" ]; then
            echo "✅ VPS_REPO_DIR"
          else
            echo "⚠️  VPS_REPO_DIR not set — will use /opt/basau-agent"
          fi
          exit $missing

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          debug: true
          script_stop: true
          envs: VPS_REPO_DIR,REPO_URL
          script: |
            set -eo pipefail
            export VPS_REPO_DIR="${VPS_REPO_DIR:-/opt/basau-agent}"
            export REPO_URL="${REPO_URL}"
            echo "=== CD deploy start ==="
            echo "REPO_DIR=$VPS_REPO_DIR"
            echo "REPO_URL=$REPO_URL"
            echo "USER=$(whoami)"
            echo "PWD=$(pwd)"

            if [ ! -f "$VPS_REPO_DIR/06-lab-complete/scripts/deploy-remote.sh" ]; then
              echo "First deploy — cloning repository..."
              mkdir -p "$VPS_REPO_DIR"
              git clone "$REPO_URL" "$VPS_REPO_DIR"
            fi

            cd "$VPS_REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
            echo "Git at: $(git rev-parse --short HEAD)"

            chmod +x "$VPS_REPO_DIR/06-lab-complete/scripts/deploy-remote.sh"
            bash -x "$VPS_REPO_DIR/06-lab-complete/scripts/deploy-remote.sh"
        env:
          VPS_REPO_DIR: ${{ secrets.VPS_REPO_DIR }}
          REPO_URL: https://github.com/${{ github.repository }}.git
