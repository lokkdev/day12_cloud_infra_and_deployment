name: CI — BaSau Agent

on:
  push:
    branches: [main]
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-basau-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: 06-lab-complete

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 06-lab-complete/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 06-lab-complete/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests -v --tb=short

      - name: Production readiness check
        run: python check_production_ready.py
