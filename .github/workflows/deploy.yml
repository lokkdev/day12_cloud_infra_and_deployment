name: CI/CD — BaSau Agent (06-lab-complete)

on:
  push:
    branches: [main]
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-basau-agent
  cancel-in-progress: true

jobs:
  ci:
    name: Production readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check production readiness
        run: python 06-lab-complete/check_production_ready.py

  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="${{ secrets.VPS_REPO_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            APP_DIR="$REPO_DIR/06-lab-complete"

            if [ ! -d "$REPO_DIR/.git" ]; then
              mkdir -p "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f "$APP_DIR/.env.local" ]; then
              echo "ERROR: $APP_DIR/.env.local not found."
              echo "Create it on the server before first deploy (see 06-lab-complete/.env.example)."
              exit 1
            fi

            cd "$APP_DIR"
            docker compose pull --ignore-pull-failures 2>/dev/null || true
            docker compose up -d --build --remove-orphans
            docker compose ps

            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
                echo "Health OK"
                curl -s http://127.0.0.1:8000/health
                exit 0
              fi
              sleep 2
            done

            echo "Health check failed — container logs:"
            docker compose logs --tail=80 agent
            exit 1
