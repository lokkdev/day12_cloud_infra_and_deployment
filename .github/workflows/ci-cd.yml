name: CI/CD — BaSau Agent

on:
  push:
    branches: [main]
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: basau-agent-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: 06-lab-complete

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 06-lab-complete/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 06-lab-complete/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests -v --tb=short

      - name: Production readiness check
        run: python check_production_ready.py

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="${{ secrets.VPS_REPO_DIR }}"
            REPO_DIR="${REPO_DIR:-/opt/basau-agent}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            APP_DIR="$REPO_DIR/06-lab-complete"

            if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            if [ ! -d "$REPO_DIR/.git" ]; then
              mkdir -p "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f "$APP_DIR/.env.local" ]; then
              echo "ERROR: $APP_DIR/.env.local not found."
              exit 1
            fi

            cd "$APP_DIR"
            $COMPOSE down --remove-orphans || true
            docker rm -f 06-lab-complete_agent_1 06-lab-complete_redis_1 2>/dev/null || true
            $COMPOSE up -d --build --remove-orphans
            $COMPOSE ps

            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
                echo "Deploy OK"
                curl -s http://127.0.0.1:8000/health
                exit 0
              fi
              sleep 2
            done

            $COMPOSE logs --tail=80 agent
            exit 1
